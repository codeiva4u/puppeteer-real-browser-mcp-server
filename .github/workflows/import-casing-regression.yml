name: Import Casing Regression

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/import-casing-regression.yml'
  push:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/import-casing-regression.yml'

jobs:
  linux-package-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run import casing regression test
        run: npm run test:regression:imports

      - name: Build package
        run: npm run build

      - name: Run packaged server smoke test
        run: npm run test:package:smoke:built
